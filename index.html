<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FahrezONE - Fahreza Raditya Busan</title>
    
    <!-- Import Font Modern dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Import FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Pengaturan Variabel Warna (Dark Mode) & Bentuk (Less Rounded) */
        :root {
            --primary-color: #D5FF8A; /* Hijau terang yang kontras di layar gelap */
            --primary-hover: #16a34a;
            --bg-color: #09090b; /* Latar belakang sangat gelap */
            --card-bg: #18181b; /* Warna kartu sedikit lebih terang dari background */
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --radius-shape: 6px; /* Sudut lebih tegas / tidak terlalu bulat */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif; /* Font yang lebih kotak dan teknis */
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            background-color: var(--card-bg);
            max-width: 480px;
            width: 100%;
            border-radius: var(--radius-shape);
            padding: 40px;
            text-align: center;
            border-top: 4px solid var(--primary-color);
            border-bottom: 1px solid #27272a;
            border-left: 1px solid #27272a;
            border-right: 1px solid #27272a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-3px);
        }

        /* Foto Profil Langsung dari GitHub */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: var(--radius-shape); /* Dibuat agak kotak menyesuaikan tema */
            object-fit: cover;
            margin: 0 auto 20px;
            border: 2px solid var(--primary-color);
            padding: 3px;
            background-color: var(--card-bg);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* Area Copywriting */
        .bio {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 30px;
            padding: 0 5px;
        }

        .bio b {
            color: var(--text-main);
        }

        /* Tautan & Ikon */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px; /* Jarak antara ikon dan teks */
            padding: 14px 20px;
            border-radius: var(--radius-shape);
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            background-color: #27272a;
            border: 1px solid #3f3f46;
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .link-btn i {
            font-size: 18px;
        }

        .link-btn:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #09090b; /* Warna teks jadi gelap saat di-hover hijau */
        }

        /* Responsif untuk Mobile */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            .profile-img {
                width: 90px;
                height: 90px;
            }
            h1 {
                font-size: 22px;
            }
            .bio {
                font-size: 14px;
            }
            .link-btn {
                padding: 12px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Ambil gambar otomatis dari URL GitHub -->
        <img src="https://github.com/fahrez182.png" alt="Fahreza Raditya Busan" class="profile-img">

        <!-- Profil -->
        <h1>Fahreza Raditya Busan</h1>
        <div class="subtitle">@FahrezONE</div>

        <!-- Copywriting Singkat -->
        <p class="bio">
            Menikmati seni merangkai kode dan memecahkan masalah melalui alur logika <b>Object-Oriented Programming (OOP)</b>.
        </p>

        <!-- Tautan -->
        <div class="links">
            <a href="https://github.com/fahrez182" target="_blank" rel="noopener noreferrer" class="link-btn">
                <i class="fa-brands fa-github"></i> GitHub Repository
            </a>
            <a href="https://play.google.com/store/apps/dev?id=7411521044038769409" target="_blank" rel="noopener noreferrer" class="link-btn">
                <i class="fa-brands fa-google-play"></i> FRB Project
            </a>
            <a href="https://whatsapp.com/channel/0029VamjH8L7oQhf4ZE2vU0u" target="_blank" rel="noopener noreferrer" class="link-btn">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp Channel
            </a>
        </div>
    </div>

</body>
</html>
